worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─────────────────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ─────────────────────────────────────────────────────────
    # Performance
    # ─────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # ─────────────────────────────────────────────────────────
    # Rate Limiting
    # ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─────────────────────────────────────────────────────────
    # Upstream
    # ─────────────────────────────────────────────────────────
    # Backend runs locally on host, use host.docker.internal to access from container
    upstream app_backend {
        server host.docker.internal:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ─────────────────────────────────────────────────────────
    # HTTP Server
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ─────────────────────────────────────────────────────
        # H5 Application (User-facing mobile)
        # ─────────────────────────────────────────────────────
        location / {
            root /usr/share/nginx/html/h5;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ─────────────────────────────────────────────────────
        # H5 Static Assets (separate from dashboard assets)
        # ─────────────────────────────────────────────────────
        location /h5/assets {
            alias /usr/share/nginx/html/h5/assets;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ─────────────────────────────────────────────────────
        # Dashboard Application (Enterprise Admin)
        # ─────────────────────────────────────────────────────
        location /dashboard {
            alias /usr/share/nginx/html/dashboard;
            index index.html;
            try_files $uri $uri/ /dashboard/index.html;
        }

        # ─────────────────────────────────────────────────────
        # Dashboard Static Assets
        # ─────────────────────────────────────────────────────
        location ^~ /dashboard/assets {
            alias /usr/share/nginx/html/dashboard/assets;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ─────────────────────────────────────────────────────
        # Shared Assets (Platform Admin and Dashboard share same assets)
        # ─────────────────────────────────────────────────────
        location ^~ /assets {
            alias /usr/share/nginx/html/dashboard/assets;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ─────────────────────────────────────────────────────
        # Platform Admin Application (SaaS Admin SPA)
        # ─────────────────────────────────────────────────────
        location /saas/ {
            alias /usr/share/nginx/html/dashboard/;
            index platform.html;
            try_files $uri $uri/ /saas/index.html;
        }
        location = /saas {
            return 301 /saas/;
        }

        # ─────────────────────────────────────────────────────
        # API Proxy (Tenant User APIs)
        # ─────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://app_backend;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffers
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ─────────────────────────────────────────────────────
        # Platform Admin API
        # ─────────────────────────────────────────────────────
        location /platform/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://app_backend/platform/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ─────────────────────────────────────────────────────
        # Auth endpoints (stricter rate limiting)
        # ─────────────────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://app_backend/api/auth/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ─────────────────────────────────────────────────────
        # WebSocket support (if needed)
        # ─────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://app_backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ─────────────────────────────────────────────────────
        # Actuator health (internal only)
        # ─────────────────────────────────────────────────────
        location /actuator/ {
            proxy_pass http://app_backend/actuator/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            internal; # Only accessible within Docker network
        }

        # ─────────────────────────────────────────────────────
        # Error pages
        # ─────────────────────────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
