spring:
  application:
    name: carbon-point-test
  main:
    allow-bean-definition-overriding: true

  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/carbon_point_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  sql:
    init:
      mode: always

  data:
    redis:
      host: localhost
      port: 6379
      database: 1

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: a3f8c9d2e1b47568a0f7e6d5c4b3a2918765432abcdef1234567890abcdef
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

security:
  captcha:
    enabled: true
    failure-threshold: 3
  password:
    min-length: 8
    max-length: 32
    min-types: 3
  rate-limit:
    max-fail-per-account: 5
    max-fail-per-ip: 5
    window-minutes: 5
  lock:
    enabled: true
    duration-minutes: 30

logging:
  level:
    com.carbonpoint: debug
    org.springframework.security: debug
