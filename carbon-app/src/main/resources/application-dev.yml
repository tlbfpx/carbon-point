server:
  port: 8080

spring:
  application:
    name: carbon-point

  # H2 console for development (disable in production)
  devtools:
    restart:
      enabled: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/carbon_point?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  sql:
    init:
      mode: never

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force-request: true
      force-response: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: ${JWT_SECRET:dev-jwt-key-localhost-only-min-32-chars-here}
  access-token-expiration: 86400000
  refresh-token-expiration: 2592000000

security:
  captcha:
    enabled: false
    failure-threshold: 3
  password:
    min-length: 8
    max-length: 32
    min-types: 3
    history-count: 5
  rate-limit:
    max-fail-per-ip: 10
    max-fail-per-account: 10
    window-minutes: 5
  lock:
    enabled: false
    duration-minutes: 30

logging:
  level:
    com.carbonpoint: debug
    org.springframework.security: info
    org.springframework.web: info
    org.mybatis: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

# CORS allowed origins for development
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://localhost:5173
