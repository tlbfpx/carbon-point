server:
  port: 8080

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:3001,http://localhost:3003,http://localhost:8081

spring:
  application:
    name: carbon-point

  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.metrics.MetricsAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.health.HealthEndpointAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.info.InfoEndpointAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.observation.ObservationAutoConfiguration

  main:
    allow-bean-definition-overriding: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/carbon_point?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql,classpath:db/platform-schema.sql,classpath:db/migration/V1__schema_optimization.sql,classpath:db/migration/V2__roles_extended_fields.sql,classpath:db/migration/V3__add_version_columns.sql
      data-locations: classpath:data.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: carbon-point-jwt-key-for-dev-20240415-32chars
  access-token-expiration: 900000
  access-token-expiration-ms: 900000
  refresh-token-expiration: 604800000
  refresh-token-expiration-ms: 604800000

# Security configuration for Phase 13
security:
  captcha:
    enabled: false
    length: 4
    expire-minutes: 5
    failure-threshold: 3
  password:
    min-length: 8
    max-length: 32
    min-types: 3
    history-count: 5
    expire-days: 90
  rate-limit:
    max-fail-per-ip: 5
    max-fail-per-account: 5
    window-minutes: 5
  lock:
    enabled: true
    duration-minutes: 30

logging:
  level:
    com.carbonpoint: debug
