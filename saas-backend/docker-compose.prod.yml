version: '3.8'

# ============================================================
# Carbon Point 生产环境部署
# ============================================================
# 使用方式:
#   1. 复制 .env.example 为 .env.prod 并填入真实值
#   2. docker-compose -f docker-compose.prod.yml up -d
#
# 生产环境要求:
#   - Java 21
#   - MySQL 8.0
#   - Redis 7.0
#   - Nginx 1.25+
# ============================================================

services:
  # ─────────────────────────────────────────────────────────
  # Spring Boot Application
  # ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: prod
    container_name: carbon-point-app
    restart: always
    ports:
      - "127.0.0.1:8080:8080"  # 仅本地暴露，Nginx 走内部网络
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-root}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=${HIKARI_MAX_POOL:-20}
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=${HIKARI_MIN_IDLE:-5}
      - SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT=30000
      - SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT=600000
      - SPRING_DATASOURCE_HIKARI_MAX_LIFETIME=1800000
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_DATABASE=${REDIS_DATABASE:-0}
      - SPRING_DATA_REDIS_TIMEOUT=5000
      - SPRING_DATA_REDIS_JEDIS_POOL_MAX_ACTIVE=20
      - SPRING_DATA_REDIS_JEDIS_POOL_MAX_IDLE=10
      - SPRING_DATA_REDIS_JEDIS_POOL_MIN_IDLE=5
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRATION=${JWT_ACCESS_EXPIRY:-86400000}
      - JWT_REFRESH_TOKEN_EXPIRATION=${JWT_REFRESH_EXPIRY:-604800000}
      - SECURITY_CAPTCHA_ENABLED=${SECURITY_CAPTCHA_ENABLED:-true}
      - SECURITY_LOCK_ENABLED=${SECURITY_LOCK_ENABLED:-true}
      - SECURITY_MAX_LOGIN_ATTEMPTS=${MAX_LOGIN_ATTEMPTS:-5}
      - SECURITY_LOCK_DURATION_MINUTES=${LOCK_DURATION:-30}
      - JAVA_OPTS=${JAVA_OPTS:--Xmx1024m -Xms512m -XX:+UseG1GC -XX:MaxRAMPercentage=75.0}
      - LOGGING_LEVEL_ROOT=${LOGGING_LEVEL_ROOT:-INFO}
      - LOGGING_LEVEL_COM_CARBONPOINT=${LOGGING_LEVEL_APP:-INFO}
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDES=health,info,metrics,prometheus
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=when-authorized
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - carbon-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1536M
        reservations:
          cpus: '1'
          memory: 768M

  # ─────────────────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: carbon-point-mysql
    restart: always
    ports:
      - "127.0.0.1:3306:3306"  # 仅本地暴露
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: carbon_point
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ../openspec/review/ddl/carbon-point-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker-entrypoint.sh:/docker-entrypoint-initdb.d/02-entrypoint.sh:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
      - --innodb_buffer_pool_size=256M
      - --innodb_log_file_size=128M
      - --innodb_flush_log_at_trx_commit=1
      - --sync_binlog=1
      - --default-authentication-plugin=caching_sha2_password
      - --slow_query_log=1
      - --long_query_time=2
    networks:
      - carbon-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M

  # ─────────────────────────────────────────────────────────
  # Redis Cache
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: carbon-point-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"  # 仅本地暴露
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD}
      - --appendonly yes
      - --appendfsync everysec
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --maxclients 10000
      - --tcp-backlog 511
      - --timeout 0
      - --tcp-keepalive 300
    volumes:
      - redis_data:/data
    networks:
      - carbon-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 384M
        reservations:
          cpus: '0.5'
          memory: 128M

  # ─────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: carbon-point-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist/h5:/usr/share/nginx/html/h5:ro
      - ./dist/dashboard:/usr/share/nginx/html/dashboard:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - carbon-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M

networks:
  carbon-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
