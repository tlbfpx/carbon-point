server:
  port: 8080

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:3001,http://localhost:3003,http://localhost:8081

spring:
  application:
    name: carbon-point

  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.metrics.MetricsAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.health.HealthEndpointAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.info.InfoEndpointAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.observation.ObservationAutoConfiguration

  main:
    allow-bean-definition-overriding: true

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force-request: true
      force-response: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/carbon_point?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql,classpath:db/platform-schema.sql,classpath:db/migration/V1__schema_optimization.sql,classpath:db/migration/V2__roles_extended_fields.sql,classpath:db/migration/V3__add_version_columns.sql,classpath:db/migration/V4__add_package_permissions.sql,classpath:db/migration/V5__init_package_data.sql,classpath:db/migration/V6__add_email_tables.sql,classpath:db/migration/V6b__create_password_history.sql,classpath:db/migration/V7__add_tenant_id_to_user_roles.sql,classpath:db/migration/V8__add_email_to_users.sql,classpath:db/migration/V9__drop_user_roles_tenant_id.sql,classpath:db/migration/V10__fix_products_max_per_user_default.sql,classpath:db/migration/V11__add_tenant_version.sql,classpath:db/migration/V12__add_tenant_package_id.sql,classpath:db/migration/V13__create_tenant_branding_table.sql,classpath:db/migration/V14__seed_test_user.sql,classpath:db/migration/V15__create_features_table.sql,classpath:db/migration/V16__create_dict_items_table.sql,classpath:db/migration/V17__create_platform_roles_table.sql,classpath:db/migration/V18__create_platform_products_table.sql,classpath:db/migration/V19__add_walking_permissions.sql,classpath:db/migration/V20__multi_product_schema.sql,classpath:db/migration/V22__add_email_to_platform_admins.sql
      data-locations: classpath:data.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: ${JWT_SECRET:carbon-point-dev-jwt-key-min-32-chars-localhost}
  access-token-expiration: 900000
  access-token-expiration-ms: 900000
  refresh-token-expiration: 2592000000
  refresh-token-expiration-ms: 2592000000

# Security configuration for Phase 13
security:
  captcha:
    enabled: false
    length: 4
    expire-minutes: 5
    failure-threshold: 3
  password:
    min-length: 8
    max-length: 32
    min-types: 3
    history-count: 5
    expire-days: 90
  rate-limit:
    max-fail-per-ip: 5
    max-fail-per-account: 5
    window-minutes: 5
  lock:
    enabled: true
    duration-minutes: 30

logging:
  level:
    com.carbonpoint: debug
